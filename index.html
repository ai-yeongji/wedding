<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 모바일 뷰포트 (접근성: 사용자 핀치-줌 허용 — maximum-scale 미설정) -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- 개인정보 보호: 검색엔진 색인·캐시·미리보기 차단 (계좌·연락처 자동수집 방지) -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />

  <!-- ───────────────────────────────────────────
       Open Graph 메타태그 — 카카오톡/SNS 공유 미리보기
       실제 배포 URL과 이미지 경로로 교체 필요
  ─────────────────────────────────────────────── -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="유동윤 ♡ 노영지 결혼합니다" />
  <meta property="og:description" content="2026년 10월 3일 토요일 오전 11시 · 노블발렌티 대치점" />
  <meta property="og:image"       content="https://ai-yeongji.github.io/wedding/images/main_visual.jpg" />
  <meta property="og:url"         content="https://ai-yeongji.github.io/wedding/" />
  <meta property="og:locale"      content="ko_KR" />

  <!-- Twitter Card (선택) -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="유동윤 ♡ 노영지 결혼합니다" />
  <meta name="twitter:description" content="2026년 10월 3일 토요일 오전 11시 · 노블발렌티 대치점" />
  <meta name="twitter:image"       content="https://ai-yeongji.github.io/wedding/images/main_visual.jpg" />

  <title>유동윤 ♡ 노영지 — 모바일 청첩장</title>

  <!-- ───────────────────────────────────────────
       Google Fonts 프리커넥트 + 폰트 로드
       - Noto Sans KR: 본문 가독성용
       - Nanum Myeongjo: 제목/포인트 우아한 명조체
       preconnect로 DNS/TLS 핸드셰이크 선행 → 로딩 속도 개선
  ─────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Nanum+Myeongjo:wght@400;700&display=swap"
  />

  <!-- 메인 스타일시트 (?v= 캐시 무효화: 수정 시 버전 숫자만 올리면 됨) -->
  <link rel="stylesheet" href="css/style.css?v=20260630e" />
</head>
<body>

  <!-- BGM 토글 버튼: bgm.js가 클릭 이벤트 및 아이콘 전환 처리 -->
  <button id="bgm-toggle" aria-label="배경음악 켜기/끄기" title="배경음악 켜기/끄기">
    ♪
  </button>

  <!-- 모달 루트: 모달이 열릴 때 JS가 role="dialog"/aria-modal을 동적 부여 -->
  <div id="modal-root" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════
       .invitation — 전체 청첩장 컨테이너
       max-width: 430px, 중앙 정렬
       (css/style.css의 .invitation 규칙 참고)
  ════════════════════════════════════════════ -->
  <main class="invitation">

    <!-- ───────────────────────────────────────
         1. 커버 / 히어로 섹션
         ui.js initCover()가 CONFIG를 읽어 동적으로 채운다.
           - CONFIG.mainVisual 배경 이미지 (onerror fallback 포함)
           - CONFIG.groom.name / CONFIG.bride.name (명조 큰 글씨)
           - CONFIG.wedding.dateText 날짜 텍스트
           - CONFIG.wedding.venue 예식장명
    ──────────────────────────────────────── -->
    <section id="cover" class="section">
      <!-- ui.js initCover()가 동적으로 채운다 -->
    </section>

    <!-- ───────────────────────────────────────
         2. 인사말 섹션
         ui.js initGreeting()이 CONFIG를 읽어 동적으로 채운다.
           - "INVITATION" 영문 서브 라벨 + 섹션 제목
           - CONFIG.greeting (\n → white-space:pre-line)
           - 양가 혼주 표기 (신랑측 / 신부측)
    ──────────────────────────────────────── -->
    <section id="greeting" class="section fade-in">
      <!-- ui.js initGreeting()이 동적으로 채운다 -->
    </section>

    <!-- ───────────────────────────────────────
         3. 달력 + 카운트다운 섹션
         countdown.js initCalendar()가 CONFIG를 읽어 동적으로 채운다.
           - 결혼식 월 달력 그리드 (일~토, 예식일 하이라이트)
           - D-day 실시간 카운트다운 (일/시간/분/초, setInterval 1초)
    ──────────────────────────────────────── -->
    <section id="calendar" class="section fade-in">
      <!-- countdown.js initCalendar()가 동적으로 채운다 -->
    </section>

    <!-- ───────────────────────────────────────
         4. 갤러리 섹션
         gallery.js initGallery()가 CONFIG를 읽어 동적으로 채운다.
           - CONFIG.gallery 배열로 터치 스와이프 캐러셀 렌더링
           - 좌우 화살표(❮ ❯) + 인디케이터 닷
           - 이미지 클릭 시 라이트박스 (#modal-root에 삽입)
           - 이미지 로드 에러 시 .img-placeholder fallback
    ──────────────────────────────────────── -->
    <section id="gallery" class="section fade-in">
      <!-- gallery.js initGallery()가 동적으로 채운다 -->
    </section>

    <!-- ───────────────────────────────────────
         5. 오시는 길 섹션
         map.js가 초기화:
           - 장소명/홀/도로명주소 텍스트
           - 주소 복사 버튼 (clipboard + execCommand fallback)
           - 카카오 지도 SDK(키 있을 때) / 회색 플레이스홀더(키 없을 때)
           - 네이버지도·카카오맵·티맵 길찾기 버튼
           - 연락처 전화/문자 버튼 (phone 빈 항목 숨김)
    ──────────────────────────────────────── -->
    <section id="location" class="section fade-in">
      <h2 class="section-title">오시는 길</h2>
      <!-- map.js가 동적으로 콘텐츠를 삽입합니다 -->
    </section>

    <!-- ───────────────────────────────────────
         6. 마음 전하실 곳 (계좌번호) 섹션
         extras.js가 초기화:
           - 신랑측/신부측 아코디언 토글
           - 각 계좌: 은행·예금주·번호 + 복사 버튼 (clipboard + fallback)
    ──────────────────────────────────────── -->
    <section id="accounts" class="section fade-in">
      <h2 class="section-title">마음 전하실 곳</h2>
      <!-- extras.js가 동적으로 콘텐츠를 삽입합니다 -->
    </section>

    <!-- ───────────────────────────────────────
         7. 참석 여부 섹션
         TODO: rsvp.js에서
           - 이름, 참석 인원, 식사 여부, 연락처 입력 폼
           - 유효성 검사 (필수 필드 체크)
           - CONFIG.appsScriptUrl로 POST 제출
           - 제출 성공/실패 피드백 UI
           - appsScriptUrl이 비어있으면 폼 disabled + 안내 메시지
    ──────────────────────────────────────── -->
    <section id="rsvp" class="section fade-in">
      <!--
        rsvp.js가 DOMContentLoaded에서 이 섹션 내부를 동적으로 렌더링합니다.
        · initRsvp(): 안내 문구 + "참석 여부 전달하기" 버튼
        · 버튼 클릭 → #modal-root에 모달 폼(구분/참석여부/이름/인원/식사/메시지) 생성
        · CONFIG.appsScriptUrl이 비어있으면 버튼 disabled + 준비 중 안내
      -->
    </section>

    <!-- ───────────────────────────────────────
         8. 방명록 섹션
         TODO: guestbook.js에서
           - CONFIG.appsScriptUrl로 기존 방명록 데이터 GET 로드
           - 이름 + 메시지 입력 폼 → POST 제출
           - 작성된 방명록 카드 리스트 렌더링
           - 로딩/에러 상태 UI 처리
           - appsScriptUrl이 비어있으면 작성 폼 disabled
    ──────────────────────────────────────── -->
    <section id="guestbook" class="section fade-in">
      <!--
        guestbook.js가 DOMContentLoaded에서 이 섹션 내부를 동적으로 렌더링합니다.
        · initGuestbook(): "축하의 한마디" 제목 + 방명록 카드 목록 + "방명록 남기기" 버튼
        · 로드 시 GET으로 목록 패치 → 카드 렌더링 (escapeHtml로 XSS 방지)
        · 버튼 클릭 → #modal-root에 모달 폼(이름/비밀번호/메시지) 생성
        · CONFIG.appsScriptUrl이 비어있으면 "준비 중" 안내, 버튼 disabled
      -->
    </section>

    <!-- ───────────────────────────────────────
         9. 공유 섹션
         extras.js가 초기화:
           - URL 복사 버튼 (clipboard + execCommand fallback)
           - CONFIG.shareKakaoKey 있을 때만 카카오톡 공유 버튼 표시
             (Kakao SDK 지연 로드 → sendDefault, 실패 시 URL 복사 fallback)
    ──────────────────────────────────────── -->
    <section id="share" class="section fade-in">
      <h2 class="section-title">공유하기</h2>
      <!-- extras.js가 동적으로 콘텐츠를 삽입합니다 -->
    </section>

    <!-- ───────────────────────────────────────
         10. 푸터
         ui.js initFooter()가 CONFIG를 읽어 동적으로 채운다.
           - 신랑 ♡ 신부 이름 (명조 포인트)
           - © {연도}. All rights reserved. (연도는 CONFIG.wedding.date에서 추출)
    ──────────────────────────────────────── -->
    <footer id="footer" class="section">
      <!-- ui.js initFooter()가 동적으로 채운다 -->
    </footer>

  </main><!-- /.invitation -->

  <!-- ═══════════════════════════════════════════
       스크립트 로드 순서 (defer: HTML 파싱 완료 후 실행)
       1. config.js  — 전역 CONFIG 객체 (반드시 첫 번째)
       2. ui.js      — 공통 DOM 조작, 스크롤 페이드인, 토스트
       3. countdown.js — 달력 그리드 + D-day 카운터
       4. gallery.js   — 이미지 그리드 + 라이트박스
       5. map.js       — 카카오/정적 지도, 길찾기 링크
       6. rsvp.js      — 참석여부 폼 제출 (Apps Script 연동)
       7. guestbook.js — 방명록 읽기/쓰기 (Apps Script 연동)
       8. bgm.js       — 배경음악 재생/정지 토글
  ════════════════════════════════════════════ -->
  <script defer src="js/config.js?v=20260630e"></script>
  <script defer src="js/ui.js?v=20260630e"></script>
  <script defer src="js/countdown.js?v=20260630e"></script>
  <script defer src="js/gallery.js?v=20260630e"></script>
  <script defer src="js/map.js?v=20260630e"></script>
  <script defer src="js/extras.js?v=20260630e"></script>
  <script defer src="js/rsvp.js?v=20260630e"></script>
  <script defer src="js/guestbook.js?v=20260630e"></script>
  <script defer src="js/bgm.js?v=20260630e"></script>

</body>
</html>
